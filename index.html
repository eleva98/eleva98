    <!-- SPA Fallback Script: Solução para erro "Esta página não existe" em hospedagem Hostinger
         Este script redireciona automaticamente URLs não encontradas para index.html,
         permitindo que o React Router (app.tsx) gerencie todas as rotas.
         Funciona capturando erros 404 e preservando a URL original na navegação. -->
    <script>
      (function() {
        // Verifica se a página atual é um arquivo real (como .html, .css, .js, .png, etc)
        const isFile = /\.\w+$/.test(window.location.pathname);

        // Se for uma rota do aplicativo (não um arquivo), armazena para o React carregar
        if (!isFile && window.location.pathname !== '/') {
          sessionStorage.setItem('spa_redirect_path', window.location.pathname);
        }
      })();

      // Listener para detectar quando um recurso não é encontrado (erro 404)
      window.addEventListener('error', function(event) {
        // Se o erro é de um arquivo não encontrado
        if (event.filename && !event.filename.includes('index.html')) {
          console.warn('Recurso não encontrado:', event.filename);
        }
      }, true);

      // Fallback adicional: se a página não carregar corretamente, redireciona para index.html
      window.addEventListener('load', function() {
        // Verifica se há uma rota armazenada e a executa
        const redirectPath = sessionStorage.getItem('spa_redirect_path');
        if (redirectPath) {
          sessionStorage.removeItem('spa_redirect_path');
          window.history.replaceState(null, '', redirectPath);
        }
      });
    </script>
